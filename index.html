<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Portfolio</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    .apple-card {
      border-radius: 20px;
      background: var(--surface-color, #ffffff);
      box-shadow:
        0 0 0 0.5px rgba(0,0,0,0.06),
        0 4px 12px rgba(0,0,0,0.08),
        0 16px 48px rgba(0,0,0,0.12);
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  box-shadow 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .apple-card:hover {
      transform: scale(1.02) translateY(-4px);
      box-shadow:
        0 0 0 0.5px rgba(0,0,0,0.08),
        0 8px 24px rgba(0,0,0,0.12),
        0 32px 80px rgba(0,0,0,0.16);
    }

    .apple-btn {
      border-radius: 980px;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      background: rgba(255, 255, 255, 0.55) !important;
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1.5px solid rgba(255, 255, 255, 0.8);
      box-shadow: 
        0 0 0 1px rgba(255, 255, 255, 0.6),
        0 8px 32px rgba(0, 0, 0, 0.16),
        0 2px 8px rgba(255, 255, 255, 0.4) inset,
        inset 0 0 20px rgba(255, 255, 255, 0.3);
      color: #0071e3 !important;
      font-weight: 600;
    }
    .apple-btn:hover { 
      transform: scale(1.05) translateY(-2px);
      background: rgba(255, 255, 255, 0.7) !important;
      border-color: rgba(255, 255, 255, 0.95);
      box-shadow: 
        0 0 0 1px rgba(255, 255, 255, 0.8),
        0 20px 60px rgba(0, 0, 0, 0.25),
        0 4px 12px rgba(255, 255, 255, 0.5) inset,
        inset 0 0 30px rgba(255, 255, 255, 0.5);
    }
    .apple-btn:active { transform: scale(0.96); }

    .modal-overlay {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .modal-overlay.active { opacity: 1; pointer-events: all; }

    .modal-content {
      transform: scale(0.92) translateY(30px);
      opacity: 0;
      transition: all 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      border-radius: 24px;
    }
    .modal-overlay.active .modal-content {
      transform: scale(1) translateY(0);
      opacity: 1;
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(28px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .anim-item {
      opacity: 0;
      animation: fadeSlideUp 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    @keyframes btnReveal {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .thumb-gradient {
      background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.55) 100%);
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }

    .tag-pill {
      border-radius: 980px;
      font-size: 11px;
      letter-spacing: 0.02em;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app-wrapper" class="w-full h-full overflow-auto" style="background:#f5f5f7; font-family:'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;">
   <header class="anim-item pt-16 pb-4 px-6 text-center" style="animation-delay:0.05s;">
    <div style="display:flex; align-items:center; justify-content:center; margin-bottom:20px;">
     <button onclick="goHome()" class="apple-btn" style="position:absolute; left:24px; display:flex; align-items:center; gap:8px; padding:10px 16px; font-size:15px; font-weight:500; border:none; cursor:pointer;"> <i data-lucide="arrow-left" style="width:16px;height:16px;"></i> <span>Home</span> </button>
    </div>
    <h1 id="page-title" style="font-size:48px; font-weight:700; letter-spacing:-0.03em; color:#1d1d1f; line-height:1.1;">My Work</h1>
    <p id="page-subtitle" style="font-size:18px; color:#86868b; margin-top:12px; font-weight:400;">A collection of websites I've built</p>
   </header>
   <main class="max-w-6xl mx-auto px-5 pb-20 pt-8">
    <div id="gallery-grid" class="grid gap-6" style="grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); max-width: 100%;">
    </div>
   </main>
   <div id="modal-overlay" class="modal-overlay fixed inset-0 z-50 flex items-center justify-center p-5" style="background:rgba(0,0,0,0.45); backdrop-filter:blur(12px);" onclick="closeModal(event)">
    <div class="modal-content w-full max-w-2xl overflow-hidden" style="background:#fff; max-height:92%;" onclick="event.stopPropagation()">
     <div class="relative">
      <div id="modal-thumb" style="height:320px; background:#e5e5ea; border-radius:24px 24px 0 0; overflow:hidden; position:relative;">
       <div class="absolute inset-0 flex items-center justify-center" style="color:#86868b;">
        <i data-lucide="globe" style="width:48px;height:48px;opacity:0.4;"></i>
       </div>
      </div><button onclick="closeModal()" class="absolute top-4 right-4 flex items-center justify-center" style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.85);backdrop-filter:blur(8px);border:none;cursor:pointer;transition:all 0.2s;"> <i data-lucide="x" style="width:18px;height:18px;color:#1d1d1f;"></i> </button>
     </div>
     <div class="p-8">
      <h2 id="modal-title" style="font-size:28px;font-weight:700;color:#1d1d1f;letter-spacing:-0.02em;"></h2>
      <p id="modal-desc" style="font-size:15px;color:#86868b;margin-top:8px;line-height:1.6;"></p>
      <div id="modal-tags" class="flex flex-wrap gap-2 mt-4"></div>
      <div id="modal-btn-wrap" style="margin-top:28px; opacity:0; animation: btnReveal 0.5s cubic-bezier(0.25,0.46,0.45,0.94) 0.3s forwards;">
       <a id="modal-link" href="#" target="_blank" rel="noopener noreferrer" class="apple-btn" style="padding:14px 32px; background:#0071e3; color:#fff; font-size:15px; font-weight:600; text-decoration:none; display:inline-flex; align-items:center; gap:8px;"> <span>Go to Website</span> <i data-lucide="arrow-up-right" style="width:16px;height:16px;"></i> </a>
      </div>
     </div>
    </div>
   </div>
  </div>
  <script>
    const projects = [
      { id:1, title:"E-Commerce Store", desc:"A modern online storefront with smooth checkout flow, product filtering, and responsive layouts.", tags:["React","Tailwind","Stripe"], color:"#0071e3", url:"#" },
      { id:2, title:"SaaS Dashboard", desc:"Analytics dashboard with real-time data visualization, dark mode, and team collaboration features.", tags:["Vue","D3.js","Firebase"], color:"#30d158", url:"#" },
      { id:3, title:"Restaurant Website", desc:"Elegant dining website with online reservations, menu browsing, and location integration.", tags:["HTML","CSS","JS"], color:"#ff6723", url:"#" },
      { id:4, title:"Portfolio Site", desc:"Creative portfolio with smooth scroll animations, project showcases, and contact forms.", tags:["Next.js","Framer Motion"], color:"#bf5af2", url:"#" },
      { id:5, title:"Blog Platform", desc:"Content-first blog with markdown support, search, categories, and responsive reading experience.", tags:["Astro","MDX"], color:"#ff375f", url:"#" },
      { id:6, title:"Fitness App Landing", desc:"High-energy landing page with video backgrounds, pricing tables, and app download CTAs.", tags:["Svelte","GSAP"], color:"#ffd60a", url:"#" },
      { id:7, title:"Travel Booking Site", desc:"Flight and hotel booking platform with interactive maps, price comparison, and user reviews.", tags:["React","Mapbox","Node.js"], color:"#00c7fd", url:"#" },
      { id:8, title:"Music Streaming Hub", desc:"Modern music player with playlists, recommendations, and social sharing capabilities.", tags:["Vue","WebAudio","Express"], color:"#ff2d55", url:"#" },
      { id:9, title:"Design System", desc:"Comprehensive component library with documentation, accessibility standards, and theme customization.", tags:["Storybook","TypeScript","CSS Modules"], color:"#a2845c", url:"#" },
    ];

    function renderGallery() {
      const grid = document.getElementById('gallery-grid');
      grid.innerHTML = '';
      
      projects.forEach((p, i) => {
        const card = document.createElement('div');
        card.className = 'apple-card anim-item cursor-pointer overflow-hidden';
        card.style.animationDelay = `${0.1 + i * 0.08}s`;
        card.onclick = () => openModal(p);
        card.innerHTML = `
          <div style="height:240px;background:linear-gradient(135deg, ${p.color}22, ${p.color}44);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:16px;">
            <!-- IMAGE GOES HERE: Replace this with <img src="your-image-url" style="width:100%;height:100%;object-fit:cover;"> -->
            <div style="text-align:center;">
              <i data-lucide="image" style="width:48px;height:48px;color:${p.color};opacity:0.5;margin-bottom:8px;"></i>
              <p style="font-size:12px;color:${p.color};opacity:0.6;font-weight:500;">Image Placeholder</p>
            </div>
            <div class="thumb-gradient absolute inset-0"></div>
          </div>
          <div style="padding:16px 22px;">
            <h3 style="font-size:16px;font-weight:650;color:#1d1d1f;letter-spacing:-0.01em;margin-bottom:8px;">${p.title}</h3>
            <div class="flex flex-wrap gap-1.5">
              ${p.tags.map(t => `<span class="tag-pill" style="padding:3px 10px;background:#f5f5f7;color:#6e6e73;font-weight:500;">${t}</span>`).join('')}
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
      
      lucide.createIcons();
    }

    function openModal(p) {
      document.getElementById('modal-title').textContent = p.title;
      document.getElementById('modal-desc').textContent = p.desc;
      document.getElementById('modal-link').href = p.url;
      document.getElementById('modal-thumb').style.background = `linear-gradient(135deg, ${p.color}22, ${p.color}55)`;
      document.getElementById('modal-thumb').innerHTML = `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;"><div style="width:80px;height:80px;border-radius:22px;background:${p.color}20;display:flex;align-items:center;justify-content:center;"><i data-lucide="globe" style="width:40px;height:40px;color:${p.color};"></i></div></div>`;

      const tagsWrap = document.getElementById('modal-tags');
      tagsWrap.innerHTML = p.tags.map(t => `<span class="tag-pill" style="padding:4px 12px;background:#f5f5f7;color:#6e6e73;font-weight:500;">${t}</span>`).join('');

      const btnWrap = document.getElementById('modal-btn-wrap');
      btnWrap.style.animation = 'none';
      btnWrap.offsetHeight;
      btnWrap.style.animation = 'btnReveal 0.5s cubic-bezier(0.25,0.46,0.45,0.94) 0.3s forwards';
      btnWrap.style.opacity = '0';

      document.getElementById('modal-overlay').classList.add('active');
      document.body.style.overflow = 'hidden';
      lucide.createIcons();
    }

    function closeModal(e) {
      if (e && e.target !== e.currentTarget) return;
      document.getElementById('modal-overlay').classList.remove('active');
      document.body.style.overflow = '';
    }

    function goHome() {
      alert('Home button clicked');
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    const defaultConfig = {
      page_title: "My Work",
      page_subtitle: "A collection of websites I've built",
      background_color: "#f5f5f7",
      surface_color: "#ffffff",
      text_color: "#1d1d1f",
      accent_color: "#0071e3",
      muted_color: "#86868b",
      font_family: "Plus Jakarta Sans",
      font_size: 16
    };

    function applyConfig(config) {
      const c = { ...defaultConfig, ...config };
      document.getElementById('page-title').textContent = c.page_title;
      document.getElementById('page-subtitle').textContent = c.page_subtitle;
      document.getElementById('app-wrapper').style.background = c.background_color;
      document.getElementById('page-title').style.color = c.text_color;
      document.getElementById('page-subtitle').style.color = c.muted_color;

      const font = `${c.font_family}, -apple-system, BlinkMacSystemFont, sans-serif`;
      document.getElementById('app-wrapper').style.fontFamily = font;
      document.getElementById('page-title').style.fontSize = `${c.font_size * 3}px`;
      document.getElementById('page-subtitle').style.fontSize = `${c.font_size * 1.125}px`;

      document.querySelectorAll('.apple-card').forEach(card => {
        card.style.background = c.surface_color;
      });

      const modalLink = document.getElementById('modal-link');
      if (modalLink) modalLink.style.background = c.accent_color;
    }

    document.addEventListener('DOMContentLoaded', async () => {
      renderGallery();
      
      if (window.elementSdk) {
        await window.elementSdk.init({
          defaultConfig,
          onConfigChange: async (config) => applyConfig(config),
          mapToCapabilities: (config) => ({
            recolorables: [
              { get: () => config.background_color || defaultConfig.background_color, set: v => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
              { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
              { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
              { get: () => config.accent_color || defaultConfig.accent_color, set: v => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
              { get: () => config.muted_color || defaultConfig.muted_color, set: v => { config.muted_color = v; window.elementSdk.setConfig({ muted_color: v }); } },
            ],
            borderables: [],
            fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: v => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
            fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: v => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } },
          }),
          mapToEditPanelValues: (config) => new Map([
            ["page_title", config.page_title || defaultConfig.page_title],
            ["page_subtitle", config.page_subtitle || defaultConfig.page_subtitle],
          ])
        });
        applyConfig(window.elementSdk.config);
      }
    });

    lucide.createIcons();
  </script>

</html>
